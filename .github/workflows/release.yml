name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: macos-15
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Build tinynudge.app
        run: |
          APP="tinynudge.app/Contents"
          mkdir -p "$APP/MacOS"
          swiftc \
            notifier/main.swift \
            notifier/Config.swift \
            notifier/Notifier.swift \
            notifier/AppActivator.swift \
            -o "$APP/MacOS/tinynudge" \
            -target ${{ matrix.arch }}-apple-macos12.0 \
            -framework Foundation \
            -framework AppKit \
            -framework ScriptingBridge
          cp notifier/Info.plist "$APP/Info.plist"
          mkdir -p "$APP/Resources"
          cp notifier/Icon.icns "$APP/Resources/Icon.icns"

      - name: Verify
        run: file tinynudge.app/Contents/MacOS/tinynudge

      - name: Package
        run: |
          tar czf tinynudge-${{ matrix.arch }}.tar.gz tinynudge.app
          shasum -a 256 tinynudge-${{ matrix.arch }}.tar.gz \
            | awk '{print $1}' > tinynudge-${{ matrix.arch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: tinynudge-${{ matrix.arch }}
          path: |
            tinynudge-${{ matrix.arch }}.tar.gz
            tinynudge-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tinynudge-arm64.tar.gz
            tinynudge-arm64.sha256
            tinynudge-x86_64.tar.gz
            tinynudge-x86_64.sha256
