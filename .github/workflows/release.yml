name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-13

    steps:
      - uses: actions/checkout@v4

      - name: Build claude-notifier.app
        run: |
          APP="claude-notifier.app/Contents"
          mkdir -p "$APP/MacOS"
          swiftc \
            notifier/main.swift \
            notifier/Config.swift \
            notifier/Notifier.swift \
            notifier/AppActivator.swift \
            -o "$APP/MacOS/claude-notifier" \
            -target ${{ matrix.arch }}-apple-macos12.0 \
            -framework Foundation \
            -framework UserNotifications \
            -framework AppKit
          cp notifier/Info.plist "$APP/Info.plist"

      - name: Verify
        run: file claude-notifier.app/Contents/MacOS/claude-notifier

      - name: Package
        run: |
          tar czf claude-notifier-${{ matrix.arch }}.tar.gz claude-notifier.app
          shasum -a 256 claude-notifier-${{ matrix.arch }}.tar.gz \
            | awk '{print $1}' > claude-notifier-${{ matrix.arch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: claude-notifier-${{ matrix.arch }}
          path: |
            claude-notifier-${{ matrix.arch }}.tar.gz
            claude-notifier-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            claude-notifier-arm64.tar.gz
            claude-notifier-arm64.sha256
            claude-notifier-x86_64.tar.gz
            claude-notifier-x86_64.sha256
