name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: macos-15
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Build tinynudge.app
        run: |
          APP="tinynudge.app/Contents"
          mkdir -p "$APP/MacOS"
          swiftc \
            notifier/main.swift \
            notifier/Config.swift \
            notifier/Notifier.swift \
            notifier/AppActivator.swift \
            -o "$APP/MacOS/tinynudge" \
            -target ${{ matrix.arch }}-apple-macos12.0 \
            -framework Foundation \
            -framework AppKit
          cp notifier/Info.plist "$APP/Info.plist"
          mkdir -p "$APP/Resources"
          cp notifier/Icon.icns "$APP/Resources/Icon.icns"

      - name: Verify
        run: file tinynudge.app/Contents/MacOS/tinynudge

      - name: Package
        run: |
          mkdir release
          cp -r tinynudge.app release/
          cp notify.sh release/
          tar czf tinynudge-${{ matrix.arch }}.tar.gz release
          shasum -a 256 tinynudge-${{ matrix.arch }}.tar.gz \
            | awk '{print $1}' > tinynudge-${{ matrix.arch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: tinynudge-${{ matrix.arch }}
          path: |
            tinynudge-${{ matrix.arch }}.tar.gz
            tinynudge-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tinynudge-arm64.tar.gz
            tinynudge-arm64.sha256
            tinynudge-x86_64.tar.gz
            tinynudge-x86_64.sha256

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_SHA=$(cat tinynudge-arm64.sha256)
          X86_SHA=$(cat tinynudge-x86_64.sha256)

          git clone https://x-access-token:${GH_TOKEN}@github.com/hiskuDN/homebrew-tap.git
          cd homebrew-tap

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/tinynudge.rb
          sed -i "s|releases/download/v[^/]*/tinynudge-arm64|releases/download/v${VERSION}/tinynudge-arm64|" Formula/tinynudge.rb
          sed -i "s|releases/download/v[^/]*/tinynudge-x86_64|releases/download/v${VERSION}/tinynudge-x86_64|" Formula/tinynudge.rb

          # Update SHA256s — arm64 comes before x86_64 in the formula
          awk -v arm="$ARM_SHA" -v x86="$X86_SHA" '
            /on_arm/    { in_arm=1 }
            /on_intel/  { in_arm=0; in_x86=1 }
            /end/        { in_arm=0; in_x86=0 }
            in_arm && /sha256/ { sub(/"[a-f0-9]+"/, "\"" arm "\"") }
            in_x86 && /sha256/ { sub(/"[a-f0-9]+"/, "\"" x86 "\"") }
            { print }
          ' Formula/tinynudge.rb > Formula/tinynudge.rb.tmp
          mv Formula/tinynudge.rb.tmp Formula/tinynudge.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tinynudge.rb
          git commit -m "tinynudge v${VERSION}"
          git push
